version: 2
sources:
- name: dev_include_access
  description: Database schema containing access policy data.
  tables:
  - name: include_participant
    description: Information specific to INCLUDE participants
    columns:
    - name: '"down_syndrome_status"'
      description: Down Syndrome status of participant
      tests:
      - not_null
      - accepted_values:
          arguments:
            values:
            - d21
            - t21
    - name: '"subject_id"'
      description: INCLUDE Global ID for the Subject
      tests:
      - not_null
      - unique
      - relationships:
          arguments:
            to: source('dev_include_access', 'subject')
            field: subject_id
            column_name: '"subject_id"'
    - name: '"sex"'
      description: Sex of Participant
      tests:
      - not_null
      - accepted_values:
          arguments:
            values:
            - female
            - male
            - other
            - unknown
    - name: '"ethnicity"'
      description: Ethnicity of Participant
      tests:
      - not_null
      - accepted_values:
          arguments:
            values:
            - hispanic_or_latino
            - not_hispanic_or_latino
            - prefer_not_to_answer
            - unknown
    - name: '"age_at_last_vital_status"'
      description: Age in days when participant's vital status was last recorded
    - name: '"vital_status"'
      description: Whether participant is alive or dead
      tests:
      - accepted_values:
          arguments:
            values:
            - dead
            - alive
    - name: '"age_at_first_engagement"'
      description: Age in days of Participant at first recorded study event (enrollment, visit, observation, sample collection, survey completion, etc.). Age at enrollment is preferred, if available.
    - name: '"access_policy_id"'
      description: Global identifier for the access policy that applies to this row of data.
      tests:
      - relationships:
          arguments:
            to: source('dev_include_access', 'access_policy')
            field: access_policy_id
            column_name: '"access_policy_id"'
    - name: '"study_id"'
      description: INCLUDE Global ID for the study
      tests:
      - relationships:
          arguments:
            to: source('dev_include_access', 'study')
            field: study_id
            column_name: '"study_id"'
  - name: access_policy
    description: The access policy that describes the controls around use of data
    columns:
    - name: '"access_policy_id"'
      description: Global identifier for the access policy that applies to this row of data.
      tests:
      - not_null
      - unique
    - name: '"data_use_accession"'
      description: Accession used to provision access to the record, eg, a dbGaP phsID.
    - name: '"data_use_permission"'
      description: Broad category of restrictions on data use.
      tests:
      - not_null
    - name: '"data_use_modifier"'
      description: Additional modifiers that limit data use.
    - name: '"disease_limitation"'
      description: If the access is limited to a specific disease purpose, it is specified here.
    - name: '"access_description"'
      description: Any additional information to support access requests.
    - name: '"website"'
      description: Website with more information about this entity.
  - name: study
    description: Study Metadata
    columns:
    - name: '"parent_study"'
      description: The parent study for this study, if it is a nested study.
      tests:
      - relationships:
          arguments:
            to: source('dev_include_access', 'study')
            field: study_id
            column_name: '"parent_study"'
    - name: '"study_title"'
      description: Full Study Title
      tests:
      - not_null
    - name: '"study_code"'
      description: Unique identifier for the study (generally a short acronym)
      tests:
      - not_null
    - name: '"study_short_name"'
      description: Short name for the study
    - name: '"study_description"'
      description: Brief description of the study (2-4 sentences)
      tests:
      - not_null
    - name: '"website"'
      description: Website with more information about this entity.
    - name: '"acknowledgments"'
      description: Funding statement and acknowledgments for this study
    - name: '"citation_statement"'
      description: Statement that secondary data users should use to acknowledge use of this study or dataset. E.g., "The results analyzed and <published or shown> here are based in whole or in part upon data generated by the INCLUDE (INvestigation of Co-occurring conditions across the Lifespan to Understand Down syndromE) Project <insert accession number(s) and/or study DOI(s)>, and were accessed from the INCLUDE Data Hub and <insert other database(s)>."
    - name: '"do_id"'
      description: Digital Object Identifier (DOI) for this Record.
      tests:
      - relationships:
          arguments:
            to: source('dev_include_access', 'doi')
            field: do_id
            column_name: '"do_id"'
    - name: '"access_policy_id"'
      description: Global identifier for the access policy that applies to this row of data.
      tests:
      - relationships:
          arguments:
            to: source('dev_include_access', 'access_policy')
            field: access_policy_id
            column_name: '"access_policy_id"'
    - name: '"study_id"'
      description: INCLUDE Global ID for the study
      tests:
      - not_null
      - unique
  - name: study_metadata
    description: Additional features about studies that may not apply to all studies
    columns:
    - name: '"study_id"'
      description: INCLUDE Global ID for the study
      tests:
      - not_null
      - unique
      - relationships:
          arguments:
            to: source('dev_include_access', 'study')
            field: study_id
            column_name: '"study_id"'
    - name: '"selection_criteria"'
      description: Brief description of inclusion and/or exclusion criteria for the study
    - name: '"vbr_id"'
      description: Information about the study's Virtual Biorepository, if participating
      tests:
      - relationships:
          arguments:
            to: source('dev_include_access', 'virtual_biorepository')
            field: vbr_id
            column_name: '"vbr_id"'
    - name: '"expected_number_of_participants"'
      description: Total expected number of participants to be recruited.
      tests:
      - not_null
    - name: '"actual_number_of_participants"'
      description: Total participants included at this time.
      tests:
      - not_null
    - name: '"access_policy_id"'
      description: Global identifier for the access policy that applies to this row of data.
      tests:
      - relationships:
          arguments:
            to: source('dev_include_access', 'access_policy')
            field: access_policy_id
            column_name: '"access_policy_id"'
  - name: virtual_biorepository
    description: An organization that can provide access to specimen for further analysis.
    columns:
    - name: '"vbr_id"'
      description: Information about the study's Virtual Biorepository, if participating
      tests:
      - not_null
      - unique
    - name: '"name"'
      description: Name of the entity.
    - name: '"institution"'
      description: Name of the institution this record is associated with.
    - name: '"website"'
      description: Website with more information about this entity.
    - name: '"vbr_readme"'
      description: Instructions for contacting or requesting samples from Virtual Biorepository, if participating
    - name: '"access_policy_id"'
      description: Global identifier for the access policy that applies to this row of data.
      tests:
      - relationships:
          arguments:
            to: source('dev_include_access', 'access_policy')
            field: access_policy_id
            column_name: '"access_policy_id"'
    - name: '"study_id"'
      description: INCLUDE Global ID for the study
      tests:
      - relationships:
          arguments:
            to: source('dev_include_access', 'study')
            field: study_id
            column_name: '"study_id"'
  - name: doi
    description: A DOI is a permanent reference with metadata about a digital object.
    columns:
    - name: '"do_id"'
      description: Digital Object Identifier (DOI) for this Record.
      tests:
      - not_null
      - unique
    - name: '"bibliographic_reference"'
      description: Text use to reference this Record.
    - name: '"access_policy_id"'
      description: Global identifier for the access policy that applies to this row of data.
      tests:
      - relationships:
          arguments:
            to: source('dev_include_access', 'access_policy')
            field: access_policy_id
            column_name: '"access_policy_id"'
    - name: '"study_id"'
      description: INCLUDE Global ID for the study
      tests:
      - relationships:
          arguments:
            to: source('dev_include_access', 'study')
            field: study_id
            column_name: '"study_id"'
  - name: investigator
    description: An individual who made contributions to the collection, analysis, or sharing of data.
    columns:
    - name: '"id"'
      description: ''
      tests:
      - not_null
      - unique
    - name: '"name"'
      description: Name of the entity.
    - name: '"institution"'
      description: Name of the institution this record is associated with.
    - name: '"investigator_title"'
      description: The title of the Investigator, eg, "Assistant Professor"
    - name: '"email"'
      description: An email address to reach the entity.
    - name: '"access_policy_id"'
      description: Global identifier for the access policy that applies to this row of data.
      tests:
      - relationships:
          arguments:
            to: source('dev_include_access', 'access_policy')
            field: access_policy_id
            column_name: '"access_policy_id"'
    - name: '"study_id"'
      description: INCLUDE Global ID for the study
      tests:
      - relationships:
          arguments:
            to: source('dev_include_access', 'study')
            field: study_id
            column_name: '"study_id"'
  - name: publication
    description: Information about a specific publication.
    columns:
    - name: '"id"'
      description: ''
      tests:
      - not_null
      - unique
    - name: '"bibliographic_reference"'
      description: Text use to reference this Record.
    - name: '"website"'
      description: Website with more information about this entity.
    - name: '"access_policy_id"'
      description: Global identifier for the access policy that applies to this row of data.
      tests:
      - relationships:
          arguments:
            to: source('dev_include_access', 'access_policy')
            field: access_policy_id
            column_name: '"access_policy_id"'
    - name: '"study_id"'
      description: INCLUDE Global ID for the study
      tests:
      - relationships:
          arguments:
            to: source('dev_include_access', 'study')
            field: study_id
            column_name: '"study_id"'
  - name: subject
    description: This entity is the subject about which data or references are recorded. This includes the idea of a human participant in a study, a cell line, an animal model, or any other similar entity.
    columns:
    - name: '"subject_id"'
      description: INCLUDE Global ID for the Subject
      tests:
      - not_null
      - unique
    - name: '"subject_type"'
      description: Type of entity this record represents
      tests:
      - not_null
      - accepted_values:
          arguments:
            values:
            - participant
            - non_participant
            - cell_line
            - animal_model
            - group
            - other
    - name: '"organism_type"'
      description: Organism Type, typically from NCBITaxon. For reference, Human is NCBITaxon:9606.
    - name: '"access_policy_id"'
      description: Global identifier for the access policy that applies to this row of data.
      tests:
      - relationships:
          arguments:
            to: source('dev_include_access', 'access_policy')
            field: access_policy_id
            column_name: '"access_policy_id"'
    - name: '"study_id"'
      description: INCLUDE Global ID for the study
      tests:
      - relationships:
          arguments:
            to: source('dev_include_access', 'study')
            field: study_id
            column_name: '"study_id"'
  - name: demographics
    description: Basic participant demographics summary
    columns:
    - name: '"subject_id"'
      description: INCLUDE Global ID for the Subject
      tests:
      - not_null
      - unique
      - relationships:
          arguments:
            to: source('dev_include_access', 'subject')
            field: subject_id
            column_name: '"subject_id"'
    - name: '"sex"'
      description: Sex of Participant
      tests:
      - not_null
      - accepted_values:
          arguments:
            values:
            - female
            - male
            - other
            - unknown
    - name: '"ethnicity"'
      description: Ethnicity of Participant
      tests:
      - not_null
      - accepted_values:
          arguments:
            values:
            - hispanic_or_latino
            - not_hispanic_or_latino
            - prefer_not_to_answer
            - unknown
    - name: '"age_at_last_vital_status"'
      description: Age in days when participant's vital status was last recorded
    - name: '"vital_status"'
      description: Whether participant is alive or dead
      tests:
      - accepted_values:
          arguments:
            values:
            - dead
            - alive
    - name: '"age_at_first_engagement"'
      description: Age in days of Participant at first recorded study event (enrollment, visit, observation, sample collection, survey completion, etc.). Age at enrollment is preferred, if available.
    - name: '"access_policy_id"'
      description: Global identifier for the access policy that applies to this row of data.
      tests:
      - relationships:
          arguments:
            to: source('dev_include_access', 'access_policy')
            field: access_policy_id
            column_name: '"access_policy_id"'
    - name: '"study_id"'
      description: INCLUDE Global ID for the study
      tests:
      - relationships:
          arguments:
            to: source('dev_include_access', 'study')
            field: study_id
            column_name: '"study_id"'
  - name: family
    description: A group of individuals of some relation who are grouped together in a study.
    columns:
    - name: '"family_id"'
      description: Global ID for the Family
      tests:
      - not_null
      - unique
    - name: '"family_type"'
      description: Describes the 'type' of study family, eg, trio.
      tests:
      - accepted_values:
          arguments:
            values:
            - control_only
            - duo
            - proband_only
            - trio
            - trio_plus
    - name: '"family_description"'
      description: Free text describing the study family, such as potential inheritance or details about consanguinity
    - name: '"consanguinity"'
      description: Is there known or suspected consanguinity in this study family?
      tests:
      - accepted_values:
          arguments:
            values:
            - not_suspected
            - suspected
            - known_present
            - unknown
    - name: '"family_study_focus"'
      description: The specific focus of the investigation, eg, a condition.
    - name: '"access_policy_id"'
      description: Global identifier for the access policy that applies to this row of data.
      tests:
      - relationships:
          arguments:
            to: source('dev_include_access', 'access_policy')
            field: access_policy_id
            column_name: '"access_policy_id"'
    - name: '"study_id"'
      description: INCLUDE Global ID for the study
      tests:
      - relationships:
          arguments:
            to: source('dev_include_access', 'study')
            field: study_id
            column_name: '"study_id"'
  - name: family_relationship
    description: A relationship between two Subjects. Directed as follows <family_member_id> <relationship> <subject_id> <Mother's id> <KIN:027 "isBiologicalMotherOf"> <subject_id>
    columns:
    - name: '"family_relationship_id"'
      description: Global ID for the Family Relationship
      tests:
      - not_null
      - unique
    - name: '"family_member_id"'
      description: The family member Subject who is the relationship "subject".
      tests:
      - not_null
      - relationships:
          arguments:
            to: source('dev_include_access', 'subject')
            field: subject_id
            column_name: '"family_member_id"'
    - name: '"relationship_type"'
      description: Code definting the relationship predicate. Relationship of the "Family Member" to the "Subject", eg, mother of.
      tests:
      - not_null
    - name: '"subject_id"'
      description: The family member Subject who is the relationship "object".
      tests:
      - not_null
      - relationships:
          arguments:
            to: source('dev_include_access', 'subject')
            field: subject_id
            column_name: '"subject_id"'
    - name: '"access_policy_id"'
      description: Global identifier for the access policy that applies to this row of data.
      tests:
      - relationships:
          arguments:
            to: source('dev_include_access', 'access_policy')
            field: access_policy_id
            column_name: '"access_policy_id"'
    - name: '"study_id"'
      description: INCLUDE Global ID for the study
      tests:
      - relationships:
          arguments:
            to: source('dev_include_access', 'study')
            field: study_id
            column_name: '"study_id"'
  - name: family_member
    description: Designates a Subject as a member of a family with a specified role.
    columns:
    - name: '"id"'
      description: ''
      tests:
      - not_null
      - unique
    - name: '"family_id"'
      description: Global ID for the Family
      tests:
      - not_null
      - relationships:
          arguments:
            to: source('dev_include_access', 'family')
            field: family_id
            column_name: '"family_id"'
    - name: '"subject_id"'
      description: INCLUDE Global ID for the Subject
      tests:
      - not_null
      - relationships:
          arguments:
            to: source('dev_include_access', 'subject')
            field: subject_id
            column_name: '"subject_id"'
    - name: '"family_role"'
      description: The "role" of this individual in this family. Could include terms like "proband", "mother", etc.
    - name: '"access_policy_id"'
      description: Global identifier for the access policy that applies to this row of data.
      tests:
      - relationships:
          arguments:
            to: source('dev_include_access', 'access_policy')
            field: access_policy_id
            column_name: '"access_policy_id"'
    - name: '"study_id"'
      description: INCLUDE Global ID for the study
      tests:
      - relationships:
          arguments:
            to: source('dev_include_access', 'study')
            field: study_id
            column_name: '"study_id"'
  - name: subject_assertion
    description: Assertion about a particular Subject. May include Conditions, Measurements, etc.
    columns:
    - name: '"assertion_id"'
      description: INCLUDE Global ID for the Assertion
      tests:
      - not_null
      - unique
    - name: '"subject_id"'
      description: INCLUDE Global ID for the Subject
      tests:
      - relationships:
          arguments:
            to: source('dev_include_access', 'subject')
            field: subject_id
            column_name: '"subject_id"'
    - name: '"encounter_id"'
      description: Unique identifier for this Encounter.
      tests:
      - relationships:
          arguments:
            to: source('dev_include_access', 'encounter')
            field: encounter_id
            column_name: '"encounter_id"'
    - name: '"assertion_provenance"'
      description: The original source of this assertion
      tests:
      - accepted_values:
          arguments:
            values:
            - medical_record
            - investigator_assessment
            - participant_or_caregiver_report
            - other
    - name: '"age_at_assertion"'
      description: The age in days of the Subject when the assertion was made.
    - name: '"age_at_event"'
      description: The age in days of the Subject at the time point which the assertion describes, eg, age of onset or when a measurement was performed.
    - name: '"age_at_resolution"'
      description: The age in days of the Subject when the asserted state was resolved.
    - name: '"concept_source"'
      description: The source text yielding the standardized concept.
    - name: '"value_number"'
      description: The numeric value of the assertion.
    - name: '"value_source"'
      description: The source text yielding the value.
    - name: '"value_unit"'
      description: The structured term defining the units of the value.
      tests:
      - relationships:
          arguments:
            to: source('dev_include_access', 'concept')
            field: concept_curie
            column_name: '"value_unit"'
    - name: '"value_unit_source"'
      description: The source text yielding the value's units.
    - name: '"access_policy_id"'
      description: Global identifier for the access policy that applies to this row of data.
      tests:
      - relationships:
          arguments:
            to: source('dev_include_access', 'access_policy')
            field: access_policy_id
            column_name: '"access_policy_id"'
    - name: '"study_id"'
      description: INCLUDE Global ID for the study
      tests:
      - relationships:
          arguments:
            to: source('dev_include_access', 'study')
            field: study_id
            column_name: '"study_id"'
  - name: concept
    description: A standardized concept with display information.
    columns:
    - name: '"concept_curie"'
      description: The standardized curie for the term.
      tests:
      - not_null
      - unique
    - name: '"display"'
      description: The friendly display string of the coded term.
  - name: sample
    description: A functionally equivalent specimen taken from a participant or processed from such a sample.
    columns:
    - name: '"sample_id"'
      description: The unique identifier for this Sample.
      tests:
      - not_null
      - unique
    - name: '"biospecimen_collection_id"'
      description: Biospecimen Collection during which this sample was generated.
      tests:
      - relationships:
          arguments:
            to: source('dev_include_access', 'biospecimen_collection')
            field: biospecimen_collection_id
            column_name: '"biospecimen_collection_id"'
    - name: '"parent_sample_id"'
      description: Sample from which this sample is derived
      tests:
      - relationships:
          arguments:
            to: source('dev_include_access', 'sample')
            field: sample_id
            column_name: '"parent_sample_id"'
    - name: '"sample_type"'
      description: Type of material of which this Sample is comprised. UBERON is recommended.
      tests:
      - not_null
    - name: '"availablity_status"'
      description: Can this Sample be requested for further analysis?
      tests:
      - accepted_values:
          arguments:
            values:
            - available
            - unavailable
    - name: '"quantity_number"'
      description: The total quantity of the specimen
    - name: '"quantity_unit"'
      description: The structured term defining the units of the quantity.
      tests:
      - relationships:
          arguments:
            to: source('dev_include_access', 'concept')
            field: concept_curie
            column_name: '"quantity_unit"'
    - name: '"access_policy_id"'
      description: Global identifier for the access policy that applies to this row of data.
      tests:
      - relationships:
          arguments:
            to: source('dev_include_access', 'access_policy')
            field: access_policy_id
            column_name: '"access_policy_id"'
    - name: '"study_id"'
      description: INCLUDE Global ID for the study
      tests:
      - relationships:
          arguments:
            to: source('dev_include_access', 'study')
            field: study_id
            column_name: '"study_id"'
  - name: biospecimen_collection
    description: A biospecimen collection event which yields one or more Samples.
    columns:
    - name: '"biospecimen_collection_id"'
      description: Unique identifier for this Biospecimen Collection.
      tests:
      - not_null
      - unique
    - name: '"age_at_collection"'
      description: The age at which this biospecimen was collected in decimal years.
    - name: '"method"'
      description: The approach used to collect the biospecimen.
    - name: '"site"'
      description: The location of the specimen collection.
    - name: '"spatial_qualifier"'
      description: Qualifier that further refine the specific location of biospecimen collection
    - name: '"laterality"'
      description: Laterality that further refine the specific location of biospecimen collection
    - name: '"encounter_id"'
      description: Unique identifier for this Encounter.
      tests:
      - relationships:
          arguments:
            to: source('dev_include_access', 'encounter')
            field: encounter_id
            column_name: '"encounter_id"'
    - name: '"access_policy_id"'
      description: Global identifier for the access policy that applies to this row of data.
      tests:
      - relationships:
          arguments:
            to: source('dev_include_access', 'access_policy')
            field: access_policy_id
            column_name: '"access_policy_id"'
    - name: '"study_id"'
      description: INCLUDE Global ID for the study
      tests:
      - relationships:
          arguments:
            to: source('dev_include_access', 'study')
            field: study_id
            column_name: '"study_id"'
  - name: aliquot
    description: A specific tube or amount of a biospecimen associated with a Sample.
    columns:
    - name: '"aliquot_id"'
      description: Unique identifier for an Aliquot.
      tests:
      - not_null
      - unique
    - name: '"sample_id"'
      description: The unique identifier for this Sample.
      tests:
      - relationships:
          arguments:
            to: source('dev_include_access', 'sample')
            field: sample_id
            column_name: '"sample_id"'
    - name: '"availablity_status"'
      description: Can this Sample be requested for further analysis?
      tests:
      - accepted_values:
          arguments:
            values:
            - available
            - unavailable
    - name: '"quantity_number"'
      description: The total quantity of the specimen
    - name: '"quantity_unit"'
      description: The structured term defining the units of the quantity.
      tests:
      - relationships:
          arguments:
            to: source('dev_include_access', 'concept')
            field: concept_curie
            column_name: '"quantity_unit"'
    - name: '"concentration_number"'
      description: What is the concentration of the analyte in the Aliquot?
    - name: '"concentration_unit"'
      description: Units associated with the concentration of the analyte in the Aliquot.
      tests:
      - relationships:
          arguments:
            to: source('dev_include_access', 'concept')
            field: concept_curie
            column_name: '"concentration_unit"'
    - name: '"access_policy_id"'
      description: Global identifier for the access policy that applies to this row of data.
      tests:
      - relationships:
          arguments:
            to: source('dev_include_access', 'access_policy')
            field: access_policy_id
            column_name: '"access_policy_id"'
    - name: '"study_id"'
      description: INCLUDE Global ID for the study
      tests:
      - relationships:
          arguments:
            to: source('dev_include_access', 'study')
            field: study_id
            column_name: '"study_id"'
  - name: encounter
    description: An event at which data was collected about a participant, an intervention was made, or information about a participant was recorded.
    columns:
    - name: '"encounter_id"'
      description: Unique identifier for this Encounter.
      tests:
      - not_null
      - unique
    - name: '"subject_id"'
      description: INCLUDE Global ID for the Subject
      tests:
      - relationships:
          arguments:
